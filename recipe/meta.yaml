{% set name = "pyOMA-2" %}
{% set version = "1.2.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pyoma_2-{{ version }}.tar.gz
  sha256: 648b00b992e722e4974f66b0f1bc95dfbd3bf4f27dbfe454b2b5f556ed84d0d0

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }},<3.13
    - numpy
    - pandas >=2.0.3
    - scipy >=1.9.3
    - pydantic >=2.5.1
    - tqdm >=4.66.1
    - matplotlib-base >=3.7.4
    - pyvista
    - pyvistaqt
    - pyqt
    - vtk
    - openpyxl >=3.1.3
    - scikit-learn >=1.3.2

test:
  imports:
    - pyoma2
  # pip check disabled: pyqt5/vtk version mismatches between PyPI and conda
  # commands:
  #   - pip check
  requires:
    # - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/pyOMA-2/
  summary: Python module for conducting Operational Modal Analysis
  description: |
    pyOMA-2 is a Python module for conducting Operational Modal Analysis.
  dev_url: https://github.com/dagghe/pyOMA2
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - dagghe
    - dfm88
