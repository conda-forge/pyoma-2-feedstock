{% set name = "pyOMA-2" %}
{% set version = "1.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pyoma_2-{{ version }}.tar.gz
  sha256: 04bb690c3bb8c94606f75b568efb6291b72cb61dcabc6b6b9ac7c1698b27c6ba

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }},<3.15
    - numpy >=1.25
    - pandas >=2.0.3
    - scipy >=1.9.3
    - pydantic >=2.5.1
    - tqdm >=4.66.1
    - scikit-learn >=1.3.2
    - openpyxl >=3.1.3
    - requests >=2.28
    - matplotlib-base >=3.7.4
    - pyvista
    - pyvistaqt
    - pyqt
    - vtk >=9.4.0

test:
  imports:
    - pyoma2
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/pyOMA-2/
  summary: Python module for conducting Operational Modal Analysis
  description: |
    pyOMA-2 is a Python module for conducting Operational Modal Analysis.
  dev_url: https://github.com/dagghe/pyOMA2
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - dagghe
    - dfm88
